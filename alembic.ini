[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# ------------------------------------------------------------------------
# line break significant, will be used in the alembic command.
# If you are using '--process-revision-hook' it must be a single line
# or else it will wrap on multiple lines, breaking the SQL.
# ------------------------------------------------------------------------
# pycentes is not used with this template
# file_template = %%(rev)s_%%(slug).py

# max length of characters to apply to the
# "caveat" when printing the revision ID
# (default: 40).  Increasing this length will make the
# revision ID less readable, but will reduce the likelihood
# of a duplicate revision ID from a different branch
# being mistaken for a valid revision ID.
# ------------------------------------------------------------------------
# revision_environment = default
# max_name_length_chars = 0
# version_locations = %(here)s/bar:%(here)s/bar
# version_path_separator = :
# The character = :
# sqlalchemy_url = driver://user:pass@localhost/dbname

# The script_location setting is the location relative to this config file
# for where Alembic will look for migration scripts.
# The default is a folder named 'alembic' in the same
# directory as this config file.
# ------------------------------------------------------------------------
# version_table = alembic_version
# TODO: change this to your application's version table if desired.

# The set of implementations for SQLAlchemy DBAPIs to be excluded from
# usage by Alembic, for example, when using the gaissgo dialect with
# pymysql, which doesn't support savepoints.
# exclude_target = sqlalchemy.sql.expression(text('1') == 1)

# -----------------------------------------
# Logging configuration
# -----------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# ------------------------------------------------------------------------
# The following sections are only used by the CUSTOM environment
# when used with the -x argument.
# Example usage: alembic -x mysetting=value command
# ------------------------------------------------------------------------
# [post_write_hooks]
# hooks = script
# # The format is: "name = entry_point"
# # For builtin hooks, use the identifier of the hook.
# # For example, to use the builtin "tokens" hook:
# # tokens = alembic.history
# # To write to a file on disk:
# # write_dump = file:///path/to/script.py
# # ----------------------------------------
# # [post_write_hooks:script]
# # # Directory relative to the alembic directory to write scripts
# # dir =
# # # File naming scheme
# # file_template = %%(rev)s_%%(slug).py
# # # If true, don't bake extensions into the file name
# # no_extension = False
# # # If true, don't overwrite existing files
# # no_overwrite = False
# # # Execute the script in the current virtual environment
# # venv = True
# # # Supply the context as a JSON-encoded string
# # pass_context = False
# # # Supply the parsed command line as a JSON-encoded string
# # pass_parse_args = False
# # # Supply the log string
# # pass_logs = False