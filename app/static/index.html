<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Librarian Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --message-user: rgba(99, 102, 241, 0.2);
            --message-bot: rgba(30, 41, 59, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-grad);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            margin: 8px 0 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styles */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background: var(--message-user);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--message-bot);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .book-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid var(--glass-border);
        }

        .book-card h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            color: #c084fc;
        }

        .book-card p {
            margin: 4px 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            margin-top: 4px;
        }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.3);
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-area input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(1px);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: transparent;
            padding: 8px 16px;
            color: var(--text-muted);
            font-size: 14px;
            font-style: italic;
        }

        .dot {
            animation: blink 1.4s infinite both;
            height: 4px;
            width: 4px;
            background: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <h1>AI Librarian Assistant</h1>
            <p>Search, discover, and explore books</p>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Hello! I'm your AI Librarian. How can I help you find a book today? You can ask me things like "Find science books by John" or "Recommend a good fantasy novel."
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                Thinking <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask anything about books..." autocomplete="off">
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = text;
            
            chatBox.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
            return msgDiv;
        }

        function appendBooks(books, parentMessage) {
            if (!books || books.length === 0) return;
            
            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                const title = document.createElement('h3');
                title.textContent = book.title;
                
                const author = document.createElement('p');
                author.textContent = `By ${book.author}`;
                
                card.appendChild(title);
                card.appendChild(author);
                
                if (book.genre) {
                    const info = document.createElement('p');
                    info.textContent = `Genre: ${book.genre}`;
                    card.appendChild(info);
                }
                
                if (book.available) {
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = 'Available';
                    card.appendChild(badge);
                }
                
                parentMessage.appendChild(card);
            });
            scrollToBottom();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Clear input and show user message
            userInput.value = '';
            appendMessage(text, true);

            // Show typing indicator
            typingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                // Call the API endpoint
                const response = await fetch('/api/v1/ai/assistant', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: text })
                });

                const data = await response.json();
                
                // Hide typing indicator
                typingIndicator.style.display = 'none';

                if (response.ok) {
                    const botMsg = appendMessage(data.answer, false);
                    appendBooks(data.books, botMsg);
                } else {
                    appendMessage("Sorry, I encountered an error. Please try again.", false);
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Network error. Please make sure the server is running.", false);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
